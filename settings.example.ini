# Copy to settings.ini and edit

[llm]
provider = gemini
model_segment = gemini-2.5-flash
model_summary = gemini-2.5-flash-lite
model_arc = gemini-2.5-pro
arc_refresh_every = 20
debug_traffic = false
# model = gemini-2.5-flash
# When model_segment/summary/arc are omitted, model= applies to all tiers.
# arc_refresh_every = 0 disables tier-3 arc refresh.
# Tier 3 runs when ## story_arc exists in story.md (every arc_refresh_every segments).
# Auth: GEMINI_API_KEY or GOOGLE_API_KEY (environment or project-root .env; see .env.example).
# Debug logs: debug/llm/traffic.jsonl (or set AUDIOBOOK_DEBUG_LLM=1)

[story]
language = en   # or fi — synced to story.md on startup

[playback]
# Trailing silence after each narrated segment (seconds, 0 = off)
segment_gap_seconds = 1.0
# Max audio waiting in the player buffer before LLM/TTS pause (seconds, 0 = unlimited)
max_buffer_seconds = 300
